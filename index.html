<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-5780436951891371">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5780436951891371"
            crossorigin="anonymous"></script>
</head>
<body>
        <div class="main-container">
        <div class="sidebar left-sidebar">
            <h2>贪吃蛇</h2>
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最高分</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">等级</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
            
            <div class="controls-panel">
                <button id="startBtn" class="btn-control btn-start">▶  开始游戏</button>
                <button id="pauseBtn" class="btn-control btn-pause" disabled>⏸  暂停</button>
                <div class="section-label">难度选择</div>
                <div class="difficulty-row">
                    <button id="diffEasy" class="btn-difficulty">简单</button>
                    <button id="diffNormal" class="btn-difficulty active">普通</button>
                    <button id="diffHard" class="btn-difficulty">困难</button>
                </div>
            </div>
            <button id="soundToggleBtn" class="btn-sound" title="音效开关">🔊</button>
        </div>

        <div class="game-area">
            <div class="game-stage">
                <div id="pauseHint" class="pause-hint" aria-live="polite"></div>
                <div id="startHint" class="start-hint">按空格键开始游戏</div>
                <canvas id="gameCanvas" width="600" height="600"></canvas>
            </div>
            <div class="dpad-container">
                <div class="dpad">
                    <button id="dpadUp" class="dpad-btn dpad-up" aria-label="向上">▲</button>
                    <button id="dpadLeft" class="dpad-btn dpad-left" aria-label="向左">◄</button>
                    <button id="dpadCenter" class="dpad-btn dpad-center" aria-label="开始/暂停"><span class="icon-play"></span></button>
                    <button id="dpadRight" class="dpad-btn dpad-right" aria-label="向右">►</button>
                    <button id="dpadDown" class="dpad-btn dpad-down" aria-label="向下">▼</button>
                </div>
            </div>
        </div>
        
        <div class="sidebar right-sidebar">
            <h3>操作说明</h3>
            <div class="instructions-box">
                <p><strong>规则</strong></p>
                <ul>
                    <li>吃食物增长身体</li>
                    <li>避免碰撞边界</li>
                    <li>避免碰撞自己</li>
                    <li>每吃10个升级</li>
                </ul>
            </div>
            
            <div class="instructions-box">
                <p><strong>键盘快捷</strong></p>
                <ul>
                    <li>↑  向上</li>
                    <li>↓  向下</li>
                    <li>←  向左</li>
                    <li>→  向右</li>
                    <li>空格 暂停</li>
                    <li>长按 加速</li>
                </ul>
            </div>
        </div>
        
        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2>游戏结束</h2>
                <div class="result-info">
                    <div class="result-item">
                        <span>最终得分</span>
                        <span id="finalScore">0</span>
                    </div>
                    <div class="result-item">
                        <span>最高分</span>
                        <span id="finalHighScore">0</span>
                    </div>
                    <div class="result-item">
                        <span>达到等级</span>
                        <span id="finalLevel">1</span>
                    </div>
                </div>
                <div id="finalFruit" class="final-fruit"></div>
                <div class="modal-actions">
                    <button id="homeBtn" class="btn-modal-action">
                        <svg width="52" height="52" viewBox="0 0 1029 1024" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1001.423238 494.592q21.504 20.48 22.528 45.056t-16.384 40.96q-19.456 17.408-45.056 16.384t-40.96-14.336q-5.12-4.096-31.232-28.672t-62.464-58.88-77.824-73.728-78.336-74.24-63.488-60.416-33.792-31.744q-32.768-29.696-64.512-28.672t-62.464 28.672q-10.24 9.216-38.4 35.328t-65.024 60.928-77.824 72.704-75.776 70.656-59.904 55.808-30.208 27.136q-15.36 12.288-40.96 13.312t-44.032-15.36q-20.48-18.432-19.456-44.544t17.408-41.472q6.144-6.144 37.888-35.84t75.776-70.656 94.72-88.064 94.208-88.064 74.752-70.144 36.352-34.304q38.912-37.888 83.968-38.4t76.8 30.208q6.144 5.12 25.6 24.064t47.616 46.08 62.976 60.928 70.656 68.096 70.144 68.096 62.976 60.928 48.128 46.592zM447.439238 346.112q25.6-23.552 61.44-25.088t64.512 25.088q3.072 3.072 18.432 17.408l38.912 35.84q22.528 21.504 50.688 48.128t57.856 53.248q68.608 63.488 153.6 142.336l0 194.56q0 22.528-16.896 39.936t-45.568 18.432l-193.536 0 0-158.72q0-33.792-31.744-33.792l-195.584 0q-17.408 0-24.064 10.24t-6.656 23.552q0 6.144-0.512 31.232t-0.512 53.76l0 73.728-187.392 0q-29.696 0-47.104-13.312t-17.408-37.888l0-203.776q83.968-76.8 152.576-139.264 28.672-26.624 57.344-52.736t52.224-47.616 39.424-36.352 19.968-18.944z"/>
                        </svg>
                    </button>
                    <button id="restartBtn" class="btn-modal-action">
                        <svg width="52" height="52" viewBox="0 0 1024 1024" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M576 133.44256V64l-256 160 256 160V263.74144c128 29.25056 224 143.488 224 280.25856 0 158.78144-129.21344 288-288 288s-288-129.21856-288-288c0-35.39456-28.60544-64-64-64s-64 28.60544-64 64c0 229.38112 186.624 416 416 416s416-186.61888 416-416c0-207.55456-153.02656-379.648-352-410.55744z"/>
                        </svg>
                    </button>
                    <button id="shareBtn" class="btn-modal-action">
                        <svg width="52" height="52" viewBox="0 0 1024 1024" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M220.525714 521.508571m-180.845714 0a180.845714 180.845714 0 1 0 361.691429 0 180.845714 180.845714 0 1 0-361.691429 0Z"/>
                            <path d="M751.36 883.2m-140.8 0a140.8 140.8 0 1 0 281.6 0 140.8 140.8 0 1 0-281.6 0Z"/>
                            <path d="M843.702857 140.8m-140.8 0a140.8 140.8 0 1 0 281.6 0 140.8 140.8 0 1 0-281.6 0Z"/>
                            <path d="M282.477714 654.939429l40.228572-69.668572L711.314286 809.618286l-40.228572 69.668571zM293.485714 419.675429L731.666286 166.692571l40.228571 69.668572L333.714286 489.380571z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
