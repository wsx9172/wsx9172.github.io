<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar left-sidebar">
            <h2>贪吃蛇</h2>
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最高分</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">等级</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
            
            <div class="controls-panel">
                <button id="startBtn" class="btn-control">▶ 开始</button>
                <button id="pauseBtn" class="btn-control">⏸ 暂停</button>
                <button id="resetBtn" class="btn-control">重置</button>
            </div>
            
            <div class="info-box">
                <p>⬆️ ⬅️ ⬇️ ➡️ 控制方向</p>
                <p>空格 暂停/继续</p>
            </div>
        </div>
        
        <div class="game-area">
            <div class="game-stage">
                <div id="pauseHint" class="pause-hint" aria-live="polite"></div>
                <canvas id="gameCanvas" width="600" height="600"></canvas>
            </div>
        </div>
        
        <div class="sidebar right-sidebar">
            <h3>操作说明</h3>
            <div class="instructions-box">
                <p><strong>规则</strong></p>
                <ul>
                    <li>吃食物增长身体</li>
                    <li>避免碰撞边界</li>
                    <li>避免碰撞自己</li>
                    <li>每吃10个升级</li>
                </ul>
            </div>
            
            <div class="instructions-box">
                <p><strong>键盘快捷</strong></p>
                <ul>
                    <li>↑ 向上</li>
                    <li>↓ 向下</li>
                    <li>← 向左</li>
                    <li>→ 向右</li>
                    <li>空格 暂停</li>
                </ul>
            </div>
        </div>
        
        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2>游戏结束</h2>
                <div class="result-info">
                    <div class="result-item">
                        <span>最终得分</span>
                        <span id="finalScore">0</span>
                    </div>
                    <div class="result-item">
                        <span>最高分</span>
                        <span id="finalHighScore">0</span>
                    </div>
                </div>
                <button id="restartBtn" class="btn-restart">重新开始</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
    
    <script src="game.js"></script>
</body>
</html>
